<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Way To Fashion</title>
    <style>
        body{
            height: 90vh;
            display: grid;
            place-items: center;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h1>Coming Soon</h1>
    <script>
        const h1 = document.querySelector('h1');
        setInterval(()=>h1.innerHTML.length>14?h1.innerHTML="Coming Soon":h1.innerHTML+=".",1000);
    </script>
</body>
</html>
